# Conda environment for the Python side of bacterial-args:
# simulation (msprime), ARG inference (tsinfer + tsdate), and the DTA control
# (TreeTime + augur). Create with:
#
#   conda env create -f environment.yml
#   conda activate bacterial-args
#
# The R side (GAIA + plotting) is installed separately; see install_packages.R.
name: bacterial-args
channels:
  - conda-forge
  - bioconda
dependencies:
  - python=3.11
  # --- simulation + ARG inference (tskit suite) ---
  - msprime>=1.3
  - tskit>=0.5.6
  - tsinfer>=0.4
  - tsdate>=0.2
  # --- VCF/Zarr interchange used by make_dfs (VariantData / VCZ export) ---
  - bio2zarr>=0.1
  - zarr>=2.17
  - sgkit>=0.8
  # --- classical control: merge local trees + discrete trait analysis ---
  - treetime>=0.11
  - biopython>=1.83
  - nextstrain-augur>=24
  - iqtree>=2.2
  # --- scientific stack + notebooks ---
  - numpy>=1.26
  - pandas>=2.0
  - scipy>=1.11
  - matplotlib>=3.8
  - jupyterlab
  # NOTE: Gubbins (recombination masking for the classical control) is not on
  # conda-forge for macOS arm64; install separately on the cluster if needed
  # (bioconda::gubbins on linux-64).
